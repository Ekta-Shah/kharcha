name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kharcha
          POSTGRES_PASSWORD: kharcha
          POSTGRES_DB: kharcha
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kharcha"
          --health-interval 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://kharcha:kharcha@localhost:5432/kharcha
      ANTHROPIC_API_KEY: dummy-key-for-ci
      AUTH_TOKEN: ""

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Lint
        run: ruff check app tests

      - name: Migrate
        run: alembic upgrade head

      - name: Test
        run: python -m pytest -v

      - name: Create eval DB
        run: |
          PGPASSWORD=kharcha psql -h localhost -U kharcha -c "CREATE DATABASE kharcha_eval;"

      - name: Eval
        run: python -m app.evals.run_recon_eval

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Type check + build
        run: npm run build
