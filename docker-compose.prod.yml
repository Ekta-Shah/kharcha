services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kharcha
      POSTGRES_PASSWORD: kharcha
      POSTGRES_DB: kharcha
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kharcha"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://kharcha:kharcha@db:5432/kharcha
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-claude-sonnet-4-5}
      AUTH_TOKEN: ${AUTH_TOKEN}
      CORS_ORIGINS: http://localhost
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
