services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kharcha
      POSTGRES_USER: kharcha
      POSTGRES_PASSWORD: kharcha
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kharcha"]
      interval: 5s
      retries: 5

volumes:
  pgdata:
